<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出席確認システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #131820;
      --border: #1e2730;
      --accent: #00d4a0;
      --accent2: #0099ff;
      --danger: #ff4f6a;
      --warning: #ffb340;
      --text: #e8edf2;
      --muted: #5a6a78;
      --mono: 'DM Mono', monospace;
      --sans: 'Noto Sans JP', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ── grid texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 160, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 160, .03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── glow orbs ── */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 160, .06) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: .15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
      opacity: .5;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: .02em;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      font-size: .85rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .05em;
      margin-top: .3rem;
      font-family: var(--mono);
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* ── sections ── */
    .section {
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── status badge ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border);
      font-size: .85rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.green {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .dot.grey {
      background: var(--muted);
    }

    .dot.red {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    .dot.pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .4;
        transform: scale(.8);
      }
    }

    .status-label {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .75rem;
    }

    .status-value {
      font-weight: 500;
      margin-left: auto;
      font-size: .8rem;
      font-family: var(--mono);
      color: var(--accent);
      word-break: break-all;
      text-align: right;
    }

    /* ── user info ── */
    .user-info {
      background: rgba(0, 212, 160, .05);
      border: 1px solid rgba(0, 212, 160, .15);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: .85rem;
    }

    .user-info .label {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .3rem;
    }

    .user-info .email {
      color: var(--accent);
      font-family: var(--mono);
      font-size: .85rem;
    }

    /* ── buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      width: 100%;
      padding: .85rem 1.5rem;
      border-radius: 10px;
      border: none;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .02em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: .8rem;
      padding: .6rem 1rem;
      width: auto;
    }

    .btn-ghost:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── result box ── */
    .result {
      border-radius: 10px;
      padding: 1.25rem;
      font-size: .9rem;
      line-height: 1.6;
      margin-top: 1.5rem;
      display: none;
    }

    .result.show {
      display: block;
      animation: fadeUp .3s ease;
    }

    .result.success {
      background: rgba(0, 212, 160, .08);
      border: 1px solid rgba(0, 212, 160, .25);
      color: var(--accent);
    }

    .result.error {
      background: rgba(255, 79, 106, .08);
      border: 1px solid rgba(255, 79, 106, .25);
      color: var(--danger);
    }

    .result.warning {
      background: rgba(255, 179, 64, .08);
      border: 1px solid rgba(255, 179, 64, .25);
      color: var(--warning);
    }

    .result-icon {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }

    .result-title {
      font-weight: 700;
      margin-bottom: .25rem;
    }

    .result-detail {
      font-size: .8rem;
      opacity: .8;
      font-family: var(--mono);
    }

    /* ── session info ── */
    .session-info {
      background: rgba(0, 153, 255, .05);
      border: 1px solid rgba(0, 153, 255, .15);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .session-info .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8rem;
      padding: .2rem 0;
    }

    .session-info .key {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
    }

    .session-info .val {
      color: var(--accent2);
      font-family: var(--mono);
      font-size: .8rem;
    }

    /* ── loading spinner ── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: .75rem;
      font-family: var(--mono);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── footer ── */
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: .72rem;
      font-family: var(--mono);
      letter-spacing: .05em;
    }

    /* ── hidden ── */
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="header">
      <div class="logo-mark">Attendance</div>
      <h1>出席確認システム
        <span>University Attendance Portal</span>
      </h1>
    </div>

    <div class="card">

      <!-- ローディング中 -->
      <div id="sec-loading" class="section">
        <div class="status-row">
          <div class="dot grey pulse"></div>
          <span class="status-label">認証状態を確認中</span>
        </div>
      </div>

      <!-- 未ログイン -->
      <div id="sec-login" class="section hidden">
        <div class="status-row">
          <div class="dot grey"></div>
          <span class="status-label">未ログイン</span>
          <span class="status-value">要認証</span>
        </div>
        <p style="font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.7;">
          大学メールアドレス（<code style="color:var(--accent2)">waseda.jp</code>）でログインしてください。
        </p>
        <button class="btn btn-primary" id="btn-login">
          メールでログイン
        </button>
        <div id="login-result" class="result"></div>
      </div>

      <!-- メールリンク送信済み -->
      <div id="sec-email-sent" class="section hidden">
        <div class="status-row">
          <div class="dot green pulse"></div>
          <span class="status-label">メール送信完了</span>
        </div>
        <div class="result show success">
          <div class="result-icon">📧</div>
          <div class="result-title">確認メールを送信しました</div>
          <div class="result-detail" id="sent-email-display"></div>
        </div>
        <p style="font-size:.8rem;color:var(--muted);margin-top:1rem;line-height:1.7;">
          メール内のリンクをクリックするとログインが完了します。<br>このタブは閉じずにそのままにしてください。
        </p>
      </div>

      <!-- ログイン済み・出席処理 -->
      <div id="sec-attend" class="section hidden">
        <div class="status-row">
          <div class="dot green pulse"></div>
          <span class="status-label">ログイン済み</span>
          <span class="status-value" id="display-email"></span>
        </div>

        <div id="session-panel" class="hidden">
          <div class="session-info">
            <div class="row">
              <span class="key">SESSION ID</span>
              <span class="val" id="display-session"></span>
            </div>
            <div class="row">
              <span class="key">OTP</span>
              <span class="val" id="display-otp"></span>
            </div>
          </div>
          <button class="btn btn-primary" id="btn-attend">
            出席を記録する
          </button>
        </div>

        <div id="no-session-panel" class="hidden">
          <p style="font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.7;">
            出席するには授業のQRコードを読み取ってください。
          </p>
          <div class="divider">または</div>
          <p style="font-size:.8rem;color:var(--muted);text-align:center;">
            QRコードを読み取ると自動でこのページに戻ります
          </p>
        </div>

        <div id="attend-result" class="result"></div>

        <div style="margin-top:1.5rem;text-align:right;">
          <button class="btn btn-ghost" id="btn-logout">ログアウト</button>
        </div>
      </div>

    </div>

    <div class="footer">© 2025 University Attendance System</div>
  </div>

  <!-- ── Firebase SDK ── -->
  <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-app-compat.js"
    integrity="sha384-3XWNJu2qFQ6l+dVvCdcgpGP7mp9cxB8uT+w78+fV0wyyiD0lYQ2yMt2cFZOlCcFp"
    crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-auth-compat.js"
    integrity="sha384-A6cYBBWGHa59uc1lMxnsMCEdmpRGH6sFBcvsp5iy586ULeLLZp7CTav7jH/SrDcr"
    crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore-compat.js"
    integrity="sha384-R+1RL8a1S5fcRQUJjEbPrKeag8MwkeFix36yw/6Hf+8n4ds8F7/CykoA5ijY1awY"
    crossorigin="anonymous"></script>
  <script src="./app.js"></script>
</body>

</html>
